<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="만화뷰어">
<title>만화 뷰어 (Nextcloud 연동)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --surface: rgba(17, 20, 25, 0.92);
    --surface-2: rgba(26, 31, 38, 0.95);
    --surface-3: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.10);
    --text: #f5f0e8;
    --text-2: rgba(245, 240, 232, 0.7);
    --text-3: rgba(245, 240, 232, 0.45);
    --accent: #ff6b35;
    --accent-2: #ff9a55;
    --accent-soft: rgba(255, 107, 53, 0.14);
    --shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
    --sidebar-w: 1120px;
    --img-scale: 1;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #090b0d; color: var(--text); font-family: 'Noto Sans KR', sans-serif; user-select: none; -webkit-user-select: none; }
  button, input { font: inherit; }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* LOGIN SCREEN */
  #login-screen {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: calc(32px + var(--safe-top)) 32px calc(32px + var(--safe-bottom));
    background: linear-gradient(135deg, rgba(255, 107, 53, 0.14), transparent 25%), linear-gradient(180deg, rgba(255,255,255,0.04), transparent 40%), #090b0d;
    overflow: hidden;
  }
  .login-shell {
    position: relative; z-index: 1; width: min(420px, 92vw);
    background: rgba(12, 15, 19, 0.82); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px; padding: 36px 32px; box-shadow: var(--shadow); backdrop-filter: blur(16px);
    animation: riseIn 0.45s ease;
  }
  .login-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 8vw, 56px); line-height: 0.95; letter-spacing: 0.08em; text-align: center; margin-bottom: 8px;}
  .login-title span { color: var(--accent); }
  .login-sub { text-align: center; font-size: 13px; color: var(--text-3); line-height: 1.6; margin-bottom: 24px;}
  
  .input-group { display: flex; flex-direction: column; gap: 12px; }
  .login-input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent); }
  
  .login-btn {
    width: 100%; border: none; border-radius: 999px; padding: 16px 24px; margin-top: 12px;
    font-size: 15px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; cursor: pointer; box-shadow: 0 12px 28px rgba(255, 107, 53, 0.28);
    transition: transform 0.18s ease;
  }
  .login-btn:active { transform: scale(0.97); }
  #login-status { text-align: center; margin-top: 16px; font-size: 12px; color: var(--accent-2); min-height: 18px; }

  /* HOME SCREEN */
  #home-screen { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; background: #090b0d; overflow: hidden; }
  #home-screen.visible { display: flex; }
  .home-header {
    flex: 0 0 auto; padding: calc(var(--safe-top) + 16px) 20px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: rgba(9, 11, 13, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .home-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.10em; color: var(--text); }
  .home-logo span { color: var(--accent); }
  .home-header-btn {
    width: 40px; height: 40px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.10); border-radius: 14px;
    background: rgba(255,255,255,0.04); color: var(--text); cursor: pointer; flex-shrink: 0; transition: all 0.15s;
  }
  .home-header-btn:hover { border-color: rgba(255,107,53,0.45); background: rgba(255,107,53,0.10); }

  .home-grid-wrap { flex: 1; min-height: 0; overflow-y: scroll; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 20px 16px calc(20px + var(--safe-bottom)); }
  .home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  @media (max-width: 400px) { .home-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

  .work-card { border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); background: rgba(18, 21, 26, 0.80); cursor: pointer; transition: all 0.2s; animation: riseIn 0.3s ease both; }
  .work-card:hover { transform: translateY(-3px) scale(1.01); border-color: rgba(255,107,53,0.40); }
  .work-thumb { aspect-ratio: 3/4; width: 100%; position: relative; overflow: hidden; background: rgba(20,24,30,0.9); }
  .work-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s ease; z-index: 2; }
  .work-thumb img.loaded { opacity: 1; }
  .work-thumb-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(73,187,255,0.06)); z-index: 1; opacity: 0.35;}
  .work-info { padding: 10px 10px 12px; }
  .work-name { font-size: 13px; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* MODE SELECT */
  #mode-select { display: none; position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); align-items: flex-end; justify-content: center; padding-bottom: var(--safe-bottom); }
  #mode-select.visible { display: flex; }
  .mode-sheet { width: min(520px, 100vw); background: rgba(12, 15, 20, 0.97); border: 1px solid rgba(255,255,255,0.09); border-radius: 28px 28px 0 0; padding: 28px 24px calc(28px + var(--safe-bottom)); animation: slideUp 0.32s cubic-bezier(0.2, 0.9, 0.2, 1); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .mode-sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.18); margin: 0 auto 20px; }
  .mode-sheet-title { text-align: center; font-size: 17px; font-weight: 700; margin-bottom: 22px; }
  .mode-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .mode-btn { border: 1px solid rgba(255,255,255,0.10); border-radius: 20px; padding: 22px 14px; background: rgba(255,255,255,0.04); color: var(--text); text-align: center; cursor: pointer; transition: all 0.18s; }
  .mode-btn:hover { border-color: rgba(255,107,53,0.45); background: rgba(255,107,53,0.08); }
  .mode-btn-icon { font-size: 28px; margin-bottom: 8px; }
  .mode-btn-name { font-size: 15px; font-weight: 700; }
  .mode-cancel-btn { width: 100%; border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; padding: 14px; background: transparent; color: var(--text-3); cursor: pointer; font-size: 14px; }

  /* VIEWER APP & SIDEBAR (기존 코드 유지 및 축소) */
  #viewer-app { display: none; height: 100vh; position: relative; overflow: hidden; }
  #sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.68); backdrop-filter: blur(3px); z-index: 70; }
  #sb-overlay.open { display: block; }
  #sidebar { position: fixed; top: 18px; left: 50%; bottom: 18px; width: min(var(--sidebar-w), 96vw); background: rgba(11,14,18,0.96); border: 1px solid var(--border); border-radius: 28px; backdrop-filter: blur(16px); display: flex; flex-direction: column; transform: translateX(-50%) translateY(12px); opacity: 0; pointer-events: none; transition: all 0.28s cubic-bezier(0.2, 0.9, 0.2, 1); z-index: 80; }
  #sidebar.open { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
  
  .sb-head { padding: 20px 18px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;}
  .sb-head h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); }
  .sidebar-close { width: 38px; height: 38px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.10); background: transparent; color: #fff; cursor: pointer; }
  
  .sidebar-body { flex: 1; padding: 18px; display: flex; flex-direction: column; overflow: hidden;}
  .sidebar-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .sidebar-tab { flex: 1; padding: 11px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text-2); cursor: pointer; font-size: 12px; font-weight: 700; }
  .sidebar-tab.active { background: linear-gradient(135deg, rgba(255,107,53,0.22), rgba(255,154,85,0.08)); border-color: rgba(255,107,53,0.55); color: #fff; }
  
  .sidebar-pages { flex: 1; position: relative; min-height: 0;}
  .sidebar-page { height: 100%; display: none; overflow-y: auto; }
  .sidebar-page.active { display: block; }
  
  .section-box { padding: 14px; border-radius: 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); margin-bottom: 14px;}
  .section-title { font-size: 11px; font-weight: 700; color: var(--text-3); margin-bottom: 10px; text-transform: uppercase; }
  
  .ep-item { padding: 14px; border-radius: 18px; background: rgba(255,255,255,0.03); margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;}
  .ep-item.active { border-color: rgba(255,107,53,0.55); background: linear-gradient(135deg, rgba(255,107,53,0.18), rgba(255,255,255,0.04)); border: 1px solid rgba(255,107,53,0.55); }
  .ep-label { font-size: 14px; font-weight: 700; }
  .ep-meta { font-size: 10px; color: var(--text-3); }

  /* READER CSS */
  #reader { width: 100%; height: 100%; position: relative; background: #000; overflow: hidden; }
  #spread-reader { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  #spread { width: 100%; height: 100%; display: flex; flex-direction: row-reverse; }
  #pg-right, #pg-left { width: 50%; height: 100%; display: flex; align-items: center; overflow: hidden; }
  #pg-right { justify-content: flex-start; } #pg-left { justify-content: flex-end; }
  #pg-right img, #pg-left img { max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.2s; }
  #pg-right img.ready, #pg-left img.ready { opacity: 1; }
  #spread.single #pg-right { width: 100%; justify-content: center; }
  #spread.single #pg-left { display: none; }

  #webtoon-reader { display: none; height: 100%; overflow-y: scroll; background: #050505; }
  .webtoon-stack { width: min(100%, 980px); margin: 0 auto; padding: 0 0 120px; display: flex; flex-direction: column; }
  .webtoon-frame { position: relative; min-height: 300px; background: transparent; }
  .webtoon-frame img { display: block; width: 100%; height: auto; opacity: 0; transition: opacity 0.2s; }
  .webtoon-frame.loaded img { opacity: 1; }

  /* HUD & ZONES */
  .zone { position: absolute; top: 0; bottom: 0; z-index: 10; cursor: pointer; }
  #z-left { left: 0; width: 30%; } #z-center { left: 30%; width: 40%; } #z-right { right: 0; width: 30%; }
  #hud { position: absolute; top: 0; left: 0; right: 0; z-index: 25; padding: 14px 16px; display: flex; align-items: center; gap: 10px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  #hud.visible { opacity: 1; pointer-events: auto; }
  .hud-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; }
  
  #toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(16px); padding: 12px 18px; border-radius: 999px; background: rgba(15,18,22,0.94); border: 1px solid rgba(255,255,255,0.08); color: var(--text); font-size: 13px; font-weight: 700; z-index: 120; opacity: 0; transition: all 0.25s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-shell">
    <div class="login-title">NEXTCLOUD<span>.</span></div>
    <div class="login-sub">서버 정보를 입력하여 만화를 불러오세요</div>
    
    <div class="input-group">
      <input type="text" id="nc-url" class="login-input" placeholder="서버 주소 (예: https://cloud.com)">
      <input type="text" id="nc-folder" class="login-input" placeholder="만화 폴더명 (예: Manga)">
      <input type="text" id="nc-user" class="login-input" placeholder="아이디">
      <input type="password" id="nc-pass" class="login-input" placeholder="앱 비밀번호">
      
      <button class="login-btn" onclick="connectNextcloud()">서버 연결</button>
      <div id="login-status"></div>
    </div>
  </div>
</div>

<div id="home-screen">
  <div class="home-header">
    <div class="home-logo">MANGA<span>.</span>VIEWER</div>
    <div>
      <button class="home-header-btn" title="로그아웃" onclick="logoutNextcloud()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="home-grid-wrap">
    <div class="home-grid" id="home-grid"></div>
  </div>
</div>

<div id="mode-select" onclick="closeModeSelect(event)">
  <div class="mode-sheet" onclick="event.stopPropagation()">
    <div class="mode-sheet-handle"></div>
    <div class="mode-sheet-title" id="mode-sheet-title">작품 제목</div>
    <div class="mode-btns">
      <button class="mode-btn" onclick="startReading('spread')">
        <div class="mode-btn-icon">📖</div>
        <div class="mode-btn-name">책 모드</div>
      </button>
      <button class="mode-btn" onclick="startReading('webtoon')">
        <div class="mode-btn-icon">📱</div>
        <div class="mode-btn-name">웹툰 모드</div>
      </button>
    </div>
    <button class="mode-cancel-btn" onclick="closeModeSelect()">취소</button>
  </div>
</div>

<div id="viewer-app">
  <div id="sb-overlay" onclick="closeSidebar()"></div>

  <aside id="sidebar">
    <div class="sb-head">
      <div>
        <h2>MANGA VIEWER</h2>
        <p id="total-label" style="font-size: 11px; color: var(--text-3);"></p>
      </div>
      <button class="sidebar-close" onclick="closeSidebar()">×</button>
    </div>

    <div class="sidebar-body">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="setSidebarTab('settings')" id="tab-settings">설정</button>
        <button class="sidebar-tab" onclick="setSidebarTab('episodes')" id="tab-episodes">회차목록</button>
      </div>

      <div class="sidebar-pages">
        <div class="sidebar-page active" id="page-settings">
          <div class="section-box">
            <button class="mode-cancel-btn" onclick="goHome()" style="background: rgba(255,255,255,0.05); color: #fff;">🏠 홈으로 나가기</button>
          </div>
        </div>
        <div class="sidebar-page" id="page-episodes">
          <div id="ep-list"></div>
        </div>
      </div>
    </div>
  </aside>

  <div id="reader">
    <div id="spread-reader">
      <div id="spread">
        <div id="pg-right"><img id="img-r"></div>
        <div id="pg-left"><img id="img-l"></div>
      </div>
    </div>

    <div id="webtoon-reader">
      <div class="webtoon-stack" id="webtoon-stack"></div>
    </div>

    <div class="zone" id="z-left" onclick="tapLeft()"></div>
    <div class="zone" id="z-center" onclick="tapCenter()"></div>
    <div class="zone" id="z-right" onclick="tapRight()"></div>

    <div id="hud">
      <button class="hud-btn" onclick="goHome()">🏠</button>
      <span id="hud-title" style="flex:1; font-size:13px; font-weight:700;"></span>
      <button class="hud-btn" onclick="toggleSidebar()">☰</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════
   STATE & CONSTANTS
════════════════════════════════════════════════════════ */
const NC_STORE_KEY = 'manga_nc_auth_v1';
let ncConfig = { url: '', folder: '', user: '', pass: '', authHeader: '' };

let worksList = [];
let selectedWork = null;
let episodePaths = {}; // { '1화': '/remote.php/webdav/Manga/던전밥/1화/' }
let episodes = {};     // { '1화': [ {url, name}, ... ] }
let epKeys = [];

let curEp = null;
let curPair = 0;
let curPage = 1;
let curMode = 'spread';

let objectUrlCache = new Map();
let activeObjectUrls = new Set();
let webtoonObserver = null;
let webtoonVisible = new Map();

/* ════════════════════════════════════════════════════════
   NEXTCLOUD & WEBDAV CORE
════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(NC_STORE_KEY);
  if (saved) {
    const data = JSON.parse(saved);
    document.getElementById('nc-url').value = data.url;
    document.getElementById('nc-folder').value = data.folder;
    document.getElementById('nc-user').value = data.user;
    document.getElementById('nc-pass').value = data.pass;
    connectNextcloud();
  }
});

async function webdavPropfind(path, depth = 1) {
  const fullUrl = ncConfig.url + path;
  const res = await fetch(fullUrl, {
    method: 'PROPFIND',
    headers: { 'Authorization': ncConfig.authHeader, 'Depth': depth.toString() }
  });
  if (!res.ok) throw new Error(`WebDAV Error: ${res.status}`);
  const xml = await res.text();
  return new DOMParser().parseFromString(xml, "text/xml");
}

async function connectNextcloud() {
  const url = document.getElementById('nc-url').value.trim().replace(/\/$/, '');
  const folder = document.getElementById('nc-folder').value.trim();
  const user = document.getElementById('nc-user').value.trim();
  const pass = document.getElementById('nc-pass').value.trim();

  if (!url || !user || !pass) {
    document.getElementById('login-status').textContent = '정보를 모두 입력해주세요.';
    return;
  }

  ncConfig = { url, folder, user, pass, authHeader: 'Basic ' + btoa(user + ':' + pass) };
  document.getElementById('login-status').textContent = '서버 연결 및 목록 불러오는 중...';

  try {
    const basePath = `/remote.php/webdav/${folder}/`;
    const xml = await webdavPropfind(basePath, 1);
    const responses = xml.getElementsByTagNameNS("*", "response");
    
    worksList = [];
    for (let i = 1; i < responses.length; i++) {
      const href = responses[i].getElementsByTagNameNS("*", "href")[0].textContent;
      const isCollection = responses[i].getElementsByTagNameNS("*", "collection").length > 0;
      if (isCollection) {
        const name = decodeURIComponent(href).split('/').filter(Boolean).pop();
        worksList.push({ name, path: href, thumbnailPath: `${href}thumbnail.jpg` });
      }
    }
    
    // 연결 성공 시 정보 저장
    localStorage.setItem(NC_STORE_KEY, JSON.stringify(ncConfig));
    renderHomeScreen();
    
  } catch (err) {
    console.error(err);
    document.getElementById('login-status').textContent = '연결 실패: CORS 설정이나 정보를 확인하세요.';
  }
}

function logoutNextcloud() {
  localStorage.removeItem(NC_STORE_KEY);
  location.reload();
}

/* ════════════════════════════════════════════════════════
   HOME SCREEN
════════════════════════════════════════════════════════ */
function renderHomeScreen() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('home-screen').classList.add('visible');
  
  const grid = document.getElementById('home-grid');
  grid.innerHTML = worksList.map((work, i) => `
    <div class="work-card" onclick="selectWork(${i})">
      <div class="work-thumb" id="wthumb-${i}">
        <div class="work-thumb-placeholder">📚</div>
      </div>
      <div class="work-info"><div class="work-name">${work.name}</div></div>
    </div>
  `).join('');

  // 썸네일 불러오기 (비동기)
  worksList.forEach((work, i) => loadThumbnail(work, i));
}

async function loadThumbnail(work, index) {
  try {
    const thumbUrl = ncConfig.url + work.thumbnailPath;
    const res = await fetch(thumbUrl, { headers: { 'Authorization': ncConfig.authHeader } });
    if (!res.ok) return;
    
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const img = document.createElement('img');
    img.onload = () => { img.classList.add('loaded'); URL.revokeObjectURL(url); };
    img.src = url;
    document.getElementById(`wthumb-${index}`).appendChild(img);
  } catch(e) {}
}

/* ════════════════════════════════════════════════════════
   MODE SELECT & PREPARE VIEWER
════════════════════════════════════════════════════════ */
function selectWork(index) {
  selectedWork = worksList[index];
  document.getElementById('mode-sheet-title').textContent = selectedWork.name;
  document.getElementById('mode-select').classList.add('visible');
}
function closeModeSelect(e) {
  if (e && e.target !== document.getElementById('mode-select')) return;
  document.getElementById('mode-select').classList.remove('visible');
}

async function startReading(mode) {
  closeModeSelect();
  curMode = mode;
  document.getElementById('home-screen').classList.remove('visible');
  document.getElementById('viewer-app').style.display = 'block';
  document.getElementById('total-label').textContent = "회차 목록 불러오는 중...";

  try {
    // 1. 작품 폴더 내의 하위 폴더(회차) 목록 가져오기
    const xml = await webdavPropfind(selectedWork.path, 1);
    const responses = xml.getElementsByTagNameNS("*", "response");
    
    let epFolders = [];
    for (let i = 1; i < responses.length; i++) {
      const href = responses[i].getElementsByTagNameNS("*", "href")[0].textContent;
      if (responses[i].getElementsByTagNameNS("*", "collection").length > 0) {
        epFolders.push(decodeURIComponent(href));
      }
    }
    
    // 자연스러운 숫자 정렬 (001화, 002화 순서 맞춤)
    epFolders.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
    
    epKeys = [];
    episodePaths = {};
    episodes = {};
    
    epFolders.forEach((href) => {
      const folderName = href.split('/').filter(Boolean).pop(); // "001화"
      epKeys.push(folderName);
      episodePaths[folderName] = href;
      episodes[folderName] = null; // 이미지는 클릭 시 Lazy Load
    });

    document.getElementById('total-label').textContent = `${selectedWork.name} · 총 ${epKeys.length}화`;
    
    renderList();
    if (epKeys.length > 0) {
      loadEp(epKeys[0]);
    }
  } catch (err) {
    alert("회차 목록을 불러오지 못했습니다.");
    goHome();
  }
}

/* ════════════════════════════════════════════════════════
   VIEWER LOGIC
════════════════════════════════════════════════════════ */
function renderList() {
  document.getElementById('ep-list').innerHTML = epKeys.map(ep => `
    <div class="ep-item" id="ei-${ep}" onclick="loadEp('${ep}')">
      <div class="ep-label">${ep}</div>
      <div class="ep-meta">${episodes[ep] ? episodes[ep].length + 'p' : '대기중'}</div>
    </div>
  `).join('');
}

async function ensureEpisodeReady(ep) {
  if (episodes[ep]) return true; // 이미 로드됨
  try {
    const xml = await webdavPropfind(episodePaths[ep], 1);
    const responses = xml.getElementsByTagNameNS("*", "response");
    
    let images = [];
    for (let i = 1; i < responses.length; i++) {
      const href = responses[i].getElementsByTagNameNS("*", "href")[0].textContent;
      if (href.match(/\.(jpe?g|png|webp|gif|avif)$/i)) {
        images.push({
          url: ncConfig.url + href,
          name: decodeURIComponent(href).split('/').pop()
        });
      }
    }
    images.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
    episodes[ep] = images;
    renderList(); // UI 갱신
    return true;
  } catch(e) { return false; }
}

async function loadEp(ep) {
  if (curEp) document.getElementById(`ei-${curEp}`)?.classList.remove('active');
  curEp = ep;
  curPair = 0;
  document.getElementById(`ei-${ep}`)?.classList.add('active');
  document.getElementById(`ei-${ep}`)?.scrollIntoView({ block:'nearest' });
  
  showToast(`${ep} 파일 불러오는 중...`);
  const ready = await ensureEpisodeReady(ep);
  if (!ready) { showToast('이미지를 불러올 수 없습니다.'); return; }
  
  closeSidebar();
  updateHUD();

  document.getElementById('spread-reader').style.display = curMode === 'spread' ? 'flex' : 'none';
  document.getElementById('webtoon-reader').style.display = curMode === 'webtoon' ? 'block' : 'none';

  if (curMode === 'webtoon') renderWebtoon();
  else drawSpread();
}

/* ════════════════════════════════════════════════════════
   IMAGE STREAMING (AUTH + BLOB)
════════════════════════════════════════════════════════ */
async function ensureObjectUrl(file) {
  const cached = objectUrlCache.get(file.url);
  if (cached) return cached;

  // WebDAV 보안을 위해 fetch + blob 방식을 사용
  const res = await fetch(file.url, { headers: { 'Authorization': ncConfig.authHeader } });
  if (!res.ok) throw new Error('Image load failed');
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  
  objectUrlCache.set(file.url, url);
  return url;
}

/* 책 모드 (단장 보기) */
async function drawSpread() {
  const files = episodes[curEp];
  if (!files || curPair >= files.length) return;
  
  const imgR = document.getElementById('img-r');
  imgR.classList.remove('ready');
  
  try {
    const url = await ensureObjectUrl(files[curPair]);
    imgR.onload = () => imgR.classList.add('ready');
    imgR.src = url;
    document.getElementById('spread').classList.add('single');
  } catch(e) { console.error(e); }
  updateHUD();
}

/* 웹툰 모드 */
function renderWebtoon() {
  const stack = document.getElementById('webtoon-stack');
  stack.innerHTML = '';
  const files = episodes[curEp];
  if (!files) return;

  files.forEach((file, idx) => {
    const frame = document.createElement('div');
    frame.className = 'webtoon-frame';
    frame.dataset.idx = idx;
    const img = document.createElement('img');
    frame.appendChild(img);
    stack.appendChild(frame);
    
    if (!webtoonObserver) {
      webtoonObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) loadWebtoonFrame(entry.target);
        });
      }, { rootMargin: '600px 0px' });
    }
    webtoonObserver.observe(frame);
  });
}

async function loadWebtoonFrame(frame) {
  if (frame.classList.contains('loaded')) return;
  const idx = frame.dataset.idx;
  const file = episodes[curEp][idx];
  
  try {
    const url = await ensureObjectUrl(file);
    const img = frame.querySelector('img');
    img.onload = () => frame.classList.add('loaded');
    img.src = url;
  } catch(e) {}
}

/* ════════════════════════════════════════════════════════
   UI CONTROLS
════════════════════════════════════════════════════════ */
function goHome() {
  document.getElementById('viewer-app').style.display = 'none';
  document.getElementById('home-screen').classList.add('visible');
  document.getElementById('webtoon-stack').innerHTML = '';
  curEp = null;
  // 메모리 정리
  objectUrlCache.forEach(url => URL.revokeObjectURL(url));
  objectUrlCache.clear();
}

function updateHUD() {
  document.getElementById('hud-title').textContent = `${selectedWork?.name} - ${curEp}`;
}

let navOn = false;
function tapLeft() {
  if (curMode !== 'spread') return;
  const files = episodes[curEp];
  if (curPair < files.length - 1) { curPair++; drawSpread(); }
}
function tapRight() {
  if (curMode !== 'spread') return;
  if (curPair > 0) { curPair--; drawSpread(); }
}
function tapCenter() {
  navOn = !navOn;
  document.getElementById('hud').classList.toggle('visible', navOn);
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sb-overlay').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sb-overlay').classList.remove('open'); }
function setSidebarTab(tab) {
  document.getElementById('tab-settings').classList.toggle('active', tab==='settings');
  document.getElementById('tab-episodes').classList.toggle('active', tab==='episodes');
  document.getElementById('page-settings').classList.toggle('active', tab==='settings');
  document.getElementById('page-episodes').classList.toggle('active', tab==='episodes');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
